<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Совет СНО ПИМУ</title>
<link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #333;
}
header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: white;
    border-bottom: 2px solid #eee;
    gap: 15px;
    flex-wrap: wrap;
}
.logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
}
.header-text {
    display: flex;
    flex-direction: column;
}
.title {
    font-size: 22px;
    font-weight: 600;
}
.slogan {
    font-size: 14px;
    font-weight: 300;
    color: #555;
    margin-top: 5px;
}
.accent {
    color: #ff7a00;
}
.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.card img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 10px;
}
.role {
    font-size: 14px;
    color: #777;
}
.name {
    font-weight: 600;
    margin-top: 5px;
}
.total-card {
    background: #fff4e6;
    border-left: 5px solid #ff7a00;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 500;
}
.total-card span {
    font-weight: 700;
    color: #ff7a00;
    font-size: 22px;
}
.search-box {
    margin-bottom: 15px;
}
.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: inherit;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow-x: auto;
    display: block;
}
th, td {
    padding: 12px;
    text-align: left;
}
th {
    background: #f0f0f0;
    cursor: pointer;
}
tr:nth-child(even) {
    background: #fafafa;
}
th:hover {
    background: #e6e6e6;
}
.error {
    color: red;
    margin-top: 10px;
}
#calendar-container {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    margin-bottom: 30px;
}
.fc {
    font-family: 'Inter', sans-serif;
}
.fc .fc-button-primary {
    background-color: #ff7a00;
    border-color: #e06a00;
}
.fc .fc-button-primary:hover {
    background-color: #e06a00;
}
@media (max-width: 768px) {
    .container {
        padding: 12px;
    }
    .title {
        font-size: 18px;
    }
    .slogan {
        font-size: 12px;
    }
    .total-card {
        font-size: 15px;
    }
    .cards {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    .card img {
        width: 90px;
        height: 90px;
    }
    th, td {
        padding: 8px;
        font-size: 14px;
    }
    .fc .fc-toolbar {
        flex-wrap: wrap;
        gap: 8px;
    }
    .fc .fc-toolbar-title {
        font-size: 1.2rem;
    }
    .fc .fc-button {
        padding: 6px 10px;
        font-size: 0.85rem;
    }
    .fc .fc-daygrid-day-frame {
        min-height: 80px;
    }
    .fc .fc-daygrid-day-number {
        font-size: 12px;
    }
}
@media (max-width: 600px) {
    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }
}
</style>
</head>
<body>

<header>
    <img src="images/logo.png" class="logo" alt="Логотип" onerror="this.style.display='none'">
    <div class="header-text">
        <div class="title">Совет <span class="accent">СНО ПИМУ</span></div>
        <div class="slogan">Развиваем тех, кто меняет медицину</div>
    </div>
</header>

<div class="container">
    <h2>Руководящий состав</h2>
    <div class="cards" id="leadership"></div>
    <div id="leadError" class="error"></div>

    <h2 style="margin-top: 40px;">Календарь событий</h2>
    <div id="calendar-container"></div>

    <h2>Рейтинг</h2>
    <div class="total-card">
        Общая сумма НОМУС-коинов: <span id="totalPointsValue">0</span>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Поиск по ФИО...">
    </div>
    <table id="ratingTable">
        <thead>
            <tr>
                <th data-col="name">ФИО</th>
                <th data-col="points">Сумма НОМУС-коинов</th>
                <th data-col="projects">Продуктовые запросы</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="ratingError" class="error"></div>
</div>

<script>
// ======================== GOOGLE SHEETS ССЫЛКИ ========================
const RATING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=0&single=true&output=csv";
const LEAD_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1094569537&single=true&output=csv";
// ВАЖНО: Замените ссылку ниже на вашу реальную CSV-ссылку листа events
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1988770029&single=true&output=csv";
// ======================================================================

// Парсер CSV
function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = '';
    let insideQuotes = false;
    for (let char of text) {
        if (char === '"') insideQuotes = !insideQuotes;
        else if (char === ',' && !insideQuotes) {
            row.push(current);
            current = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (current || row.length) {
                row.push(current);
                rows.push(row);
                row = [];
                current = '';
            }
        } else {
            current += char;
        }
    }
    if (current) row.push(current);
    if (row.length) rows.push(row);
    return rows;
}

// ======================== РЕЙТИНГ ========================
let ratingData = [];
let sortDir = 1;

async function loadRating() {
    try {
        const res = await fetch(RATING_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        ratingData = data.map(r => ({
            name: r[0] || "",
            points: parseInt(r[1]) || 0,
            projects: r[2] || ""
        }));
        const total = ratingData.reduce((sum, p) => sum + p.points, 0);
        document.getElementById('totalPointsValue').innerText = total;
        renderTable(ratingData);
    } catch(e) {
        document.getElementById('ratingError').innerText = "Ошибка загрузки рейтинга";
        console.error(e);
    }
}

function renderTable(data) {
    const tbody = document.querySelector("#ratingTable tbody");
    tbody.innerHTML = "";
    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<tr>${escapeHtml(row.name)}${row.points}${escapeHtml(row.projects)} `;
        tbody.appendChild(tr);
    });
}

document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const filtered = ratingData.filter(r => r.name.toLowerCase().includes(val));
    renderTable(filtered);
});

document.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
        const col = th.dataset.col;
        ratingData.sort((a, b) => {
            let av = a[col], bv = b[col];
            if (col === "points") { av = Number(av); bv = Number(bv); }
            return av > bv ? 1 * sortDir : -1 * sortDir;
        });
        sortDir *= -1;
        renderTable(ratingData);
    });
});

// ======================== РУКОВОДСТВО ========================
const ROLE_ORDER = [
    "Председатель Совета СНО",
    "Заместитель председателя Совета СНО, координатор по организационной работе",
    "Заместитель председателя Совета СНО, координатор по работе с СНК",
    "Координатор по информационной работе",
    "Секретарь",
    "Советник председателя"
];

async function loadLeadership() {
    try {
        const res = await fetch(LEAD_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        let leaders = data.map(r => ({
            role: r[0],
            name: r[1],
            photo: r[2]
        }));
        leaders.sort((a,b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role));
        const container = document.getElementById("leadership");
        container.innerHTML = "";
        leaders.forEach(l => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                ${l.photo ? `<img src="images/${l.photo}" onerror="this.style.display='none'">` : ""}
                <div class="role">${escapeHtml(l.role)}</div>
                <div class="name">${escapeHtml(l.name)}</div>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        document.getElementById('leadError').innerText = "Ошибка загрузки состава";
        console.error(e);
    }
}

// ======================== КАЛЕНДАРЬ (только месяц и неделя, адаптивный) ========================
let calendar;
let userHasChangedView = false; // чтобы не сбрасывать выбор пользователя

async function loadEvents() {
    if (!EVENTS_URL || EVENTS_URL.includes("gid=123456789")) {
        document.getElementById('calendar-container').innerHTML = '<p style="color:gray;">Укажите ссылку на Google Sheets с событиями (лист events: title, start, end, description) в переменной EVENTS_URL</p>';
        return;
    }
    try {
        const res = await fetch(EVENTS_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const rows = parseCSV(text).slice(1);
        const events = rows.map(row => ({
            title: row[0] || "Без названия",
            start: row[1] || "",
            end: row[2] || undefined,
            description: row[3] || ""
        })).filter(ev => ev.start);

        if (calendar) calendar.destroy();

        const isMobile = window.innerWidth <= 768;
        const initialView = isMobile ? 'timeGridWeek' : 'dayGridMonth';

        const calendarEl = document.getElementById('calendar-container');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: initialView,
            locale: 'ru',
            firstDay: 1,
            events: events,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            buttonText: {
                today: 'Сегодня',
                dayGridMonth: 'Месяц',
                timeGridWeek: 'Неделя'
            },
            eventClick: function(info) {
                const desc = info.event.extendedProps.description;
                if (desc) alert(info.event.title + "\n\n" + desc);
                else alert(info.event.title);
            },
            contentHeight: 'auto',
            dayMaxEvents: false,
            eventDisplay: 'block'
        });
        calendar.render();

        // Отслеживаем ручное переключение пользователя
        calendarEl.addEventListener('viewDidMount', () => {
            userHasChangedView = true;
        });

        // Адаптивное переключение только если пользователь не трогал вид
        window.addEventListener('resize', () => {
            if (userHasChangedView) return;
            const nowMobile = window.innerWidth <= 768;
            if (nowMobile && calendar.view.type !== 'timeGridWeek') {
                calendar.changeView('timeGridWeek');
            } else if (!nowMobile && calendar.view.type !== 'dayGridMonth') {
                calendar.changeView('dayGridMonth');
            }
        });
    } catch(e) {
        console.error('Ошибка загрузки событий:', e);
        document.getElementById('calendar-container').innerHTML = '<p style="color:red;">Не удалось загрузить календарь. Проверьте ссылку на CSV и формат дат (YYYY-MM-DD).</p>';
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

loadRating();
loadLeadership();
loadEvents();
</script>
</body>
</html>
