<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Совет СНО ПИМУ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="images/icons/icon-192.png">

<!-- Splash screens (пример, можно расширить) -->
<link rel="apple-touch-startup-image" href="images/icons/icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #333;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: white;
    border-bottom: 2px solid #eee;
}

.header-left {
    display: flex;
    align-items: center;
}

.logo {
    width: 50px;
    height: 50px;
    margin-right: 15px;
}

.header-text {
    display: flex;
    flex-direction: column;
}

.title {
    font-size: 22px;
    font-weight: 600;
}

.slogan {
    font-size: 14px;
    color: #555;
}

/* INSTALL BUTTON */
.install-btn {
    background: #ff7a00;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: none;
}

/* остальной стиль без изменений */
.container { max-width:1200px; margin:auto; padding:20px; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
.card { background:white; border-radius:12px; padding:15px; text-align:center; }
.card img { width:120px; height:120px; border-radius:50%; }
.role { color:#777; font-size:14px; }
.name { font-weight:600; }

.total-card {
    background:#fff4e6;
    border-left:5px solid #ff7a00;
    padding:12px;
    border-radius:10px;
}

table { width:100%; background:white; border-collapse:collapse; }
th,td { padding:10px; }
th { cursor:pointer; background:#eee; }

</style>
</head>

<body>

<header>
    <div class="header-left">
        <img src="images/logo.png" class="logo">
        <div class="header-text">
            <div class="title">Совет <span style="color:#ff7a00;">СНО ПИМУ</span></div>
            <div class="slogan">Развиваем тех, кто меняет медицину</div>
        </div>
    </div>

    <button id="installBtn" class="install-btn">Установить</button>
</header>

<div class="container">

<h2>Руководящий состав</h2>
<div id="leadership" class="cards"></div>

<h2>Рейтинг</h2>

<div class="total-card">
Общая сумма НОМУС-коинов: <span id="totalPointsValue">0</span>
</div>

<input id="search" placeholder="Поиск...">

<table>
<thead>
<tr>
<th data-col="name">ФИО</th>
<th data-col="points">Баллы</th>
<th data-col="projects">Проекты</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
const RATING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=0&single=true&output=csv";
const LEAD_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1094569537&single=true&output=csv";

/* =========================
   INSTALL BUTTON
========================= */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').onclick = async () => {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
};

/* =========================
   CSV PARSER
========================= */
function parseCSV(text){
    return text.split('\n').map(r => r.split(','));
}

/* =========================
   LOAD DATA (с офлайн fallback)
========================= */

async function loadRating(){
    try{
        const res = await fetch(RATING_URL);
        const text = await res.text();

        localStorage.setItem("rating", text);

        renderRating(text);

    }catch{
        console.log("offline rating");
        const cached = localStorage.getItem("rating");
        if(cached) renderRating(cached);
    }
}

function renderRating(text){
    const rows = parseCSV(text).slice(1);

    let total = 0;
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = "";

    rows.forEach(r=>{
        total += Number(r[1])||0;

        tbody.innerHTML += `
        <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        </tr>`;
    });

    document.getElementById('totalPointsValue').innerText = total;
}

async function loadLeadership(){
    try{
        const res = await fetch(LEAD_URL);
        const text = await res.text();

        localStorage.setItem("lead", text);

        renderLead(text);

    }catch{
        const cached = localStorage.getItem("lead");
        if(cached) renderLead(cached);
    }
}

function renderLead(text){
    const rows = parseCSV(text).slice(1);

    const cont = document.getElementById('leadership');
    cont.innerHTML="";

    rows.forEach(r=>{
        cont.innerHTML += `
        <div class="card">
        ${r[2]?`<img src="images/${r[2]}">`:""}
        <div class="role">${r[0]}</div>
        <div class="name">${r[1]}</div>
        </div>`;
    });
}

/* INIT */
loadRating();
loadLeadership();

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
