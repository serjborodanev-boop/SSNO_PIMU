<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Совет СНО ПИМУ</title>
<link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #333;
}
header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: white;
    border-bottom: 2px solid #eee;
    gap: 15px;
    flex-wrap: wrap;
}
.logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
}
.header-text {
    display: flex;
    flex-direction: column;
}
.title {
    font-size: 22px;
    font-weight: 600;
}
.slogan {
    font-size: 14px;
    font-weight: 300;
    color: #555;
    margin-top: 5px;
}
.accent {
    color: #ff7a00;
}
.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.card img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 10px;
}
.role {
    font-size: 14px;
    color: #777;
}
.name {
    font-weight: 600;
    margin-top: 5px;
}
.total-card {
    background: #fff4e6;
    border-left: 5px solid #ff7a00;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 500;
}
.total-card span {
    font-weight: 700;
    color: #ff7a00;
    font-size: 22px;
}
.search-box {
    margin-bottom: 15px;
}
.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: inherit;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow-x: auto;
    display: block;
}
th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
}
th {
    background: #f0f0f0;
    cursor: pointer;
}
tr:nth-child(even) {
    background: #fafafa;
}
th:hover {
    background: #e6e6e6;
}
.error {
    color: red;
    margin-top: 10px;
}
/* Кнопки */
.buttons-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin: 20px 0 30px;
}
.custom-button {
    display: inline-block;
    background-color: #ff7a00;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 500;
    transition: background 0.2s, transform 0.1s;
    border: none;
    cursor: pointer;
    font-family: inherit;
}
.custom-button:hover {
    background-color: #e06a00;
    transform: scale(1.02);
}
/* ---------- КАЛЕНДАРЬ ---------- */
.calendar-container {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    margin-bottom: 30px;
}
.filter-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}
.filter-btn {
    background: #eee;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    transition: 0.2s;
}
.filter-btn.active {
    background: #ff7a00;
    color: white;
}
.calendar-sticky-header {
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
    padding: 15px 15px 0 15px;
    border-radius: 12px 12px 0 0;
}
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: nowrap;
    gap: 10px;
}
.calendar-nav button {
    background: #ff7a00;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin: 0 4px;
    white-space: nowrap;
}
.calendar-nav button:hover {
    background: #e06a00;
}
.month-year {
    font-size: 1.5rem;
    font-weight: 600;
    text-align: center;
    flex: 1;
}
.calendar-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 15px 15px 15px;
}
.calendar-grid {
    min-width: 700px;
}
.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f0f0f0;
    border-radius: 8px;
    margin-bottom: 8px;
}
.weekday {
    padding: 10px;
    text-align: center;
    font-weight: 600;
}
.calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: white;
    border: 1px solid #ddd;
}
.day-cell {
    height: 80px;
    overflow-y: auto;
    border: 1px solid #eee;
    padding: 6px;
    background-color: white;
}
.day-number {
    font-weight: bold;
    text-align: right;
    margin-bottom: 4px;
    font-size: 14px;
}
/* Цветные полоски для мероприятий и постов */
.event-bar {
    border-radius: 4px;
    padding: 4px 6px;
    margin-top: 2px;
    font-size: 12px;
    white-space: nowrap;
    overflow-x: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: 0.1s;
}
.event-bar:hover {
    filter: brightness(0.95);
}
.event-bar--event {
    background-color: #ffefdb;
    border-left: 4px solid #ff7a00;
}
.event-bar--post {
    background-color: #e0f2fe;
    border-left: 4px solid #3b82f6;
}
/* Модальное окно */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: white;
    border-radius: 16px;
    max-width: 300px;
    width: 80%;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    text-align: center;
}
.modal-content h3 {
    margin-top: 0;
    color: #ff7a00;
}
.close-modal {
    background: #ff7a00;
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 12px;
}
@media (max-width: 768px) {
    .day-cell {
        height: 70px;
    }
    .event-bar {
        font-size: 10px;
        padding: 2px 4px;
    }
    .month-year {
        font-size: 1.2rem;
    }
    .calendar-nav button {
        padding: 6px 10px;
        font-size: 12px;
    }
    .custom-button {
        padding: 8px 16px;
        font-size: 14px;
    }
}
</style>
</head>
<body>

<header>
    <img src="images/logo.png" class="logo" alt="Логотип" onerror="this.style.display='none'">
    <div class="header-text">
        <div class="title">Совет <span class="accent">СНО ПИМУ</span></div>
        <div class="slogan">Развиваем тех, кто меняет медицину</div>
    </div>
</header>

<div class="container">
    <h2>Руководящий состав</h2>
    <div class="cards" id="leadership"></div>
    <div id="leadError" class="error"></div>

    <!-- Кнопки для Яндекс Форм (замените ссылки) -->
    <div class="buttons-row">
        <a href="https://forms.yandex.ru/u/68f7b6c35056900b882cc7ef" class="custom-button" target="_blank" rel="noopener noreferrer">📝 Предложить свой продуктовый запрос</a>
        <a href="https://forms.yandex.ru/u/6a00e4e849363997ce4f1b10" class="custom-button" target="_blank" rel="noopener noreferrer">🔒 Анонимная форма для предложений</a>
    </div>

    <h2>Календарь событий</h2>
    <div id="calendar-main"></div>

    <h2>Рейтинг</h2>
    <div class="total-card">
        Общая сумма НОМУС-коинов: <span id="totalPointsValue">0</span>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Поиск по ФИО...">
    </div>
    <table id="ratingTable">
        <thead>
            <tr>
                <th data-col="name">ФИО</th>
                <th data-col="points">Сумма НОМУС-коинов</th>
                <th data-col="projects">Продуктовые запросы</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="ratingError" class="error"></div>
</div>

<!-- Модальное окно -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
        <p id="modalDates"></p>
        <button class="close-modal" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script>
// ======================== GOOGLE SHEETS ССЫЛКИ ========================
const RATING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=0&single=true&output=csv";
const LEAD_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1094569537&single=true&output=csv";
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1988770029&single=true&output=csv";
const POSTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1345549220&single=true&output=csv";
// ======================================================================

// Парсер CSV
function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = '';
    let insideQuotes = false;
    for (let char of text) {
        if (char === '"') insideQuotes = !insideQuotes;
        else if (char === ',' && !insideQuotes) {
            row.push(current);
            current = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (current || row.length) {
                row.push(current);
                rows.push(row);
                row = [];
                current = '';
            }
        } else {
            current += char;
        }
    }
    if (current) row.push(current);
    if (row.length) rows.push(row);
    return rows;
}

// Нормализация даты
function parseDateFromString(raw) {
    if (!raw) return null;
    let str = raw.trim();
    let match = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (match) {
        return new Date(Date.UTC(match[1], match[2]-1, match[3]));
    }
    match = str.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
    if (match) {
        return new Date(Date.UTC(match[3], match[2]-1, match[1]));
    }
    return null;
}
function formatDateKey(date) {
    if (!date) return '';
    let y = date.getUTCFullYear();
    let m = String(date.getUTCMonth() + 1).padStart(2,'0');
    let d = String(date.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
}
function formatFullMonthYear(year, month) {
    const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
    return `${monthNames[month]} ${year}`;
}

// ---------- РЕЙТИНГ ----------
let ratingData = [];
let sortDir = 1;

async function loadRating() {
    try {
        const res = await fetch(RATING_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        ratingData = data.map(r => ({
            name: r[0] || "",
            points: parseInt(r[1]) || 0,
            projects: r[2] || ""
        }));
        const total = ratingData.reduce((sum, p) => sum + p.points, 0);
        document.getElementById('totalPointsValue').innerText = total;
        renderTable(ratingData);
    } catch(e) {
        document.getElementById('ratingError').innerText = "Ошибка загрузки рейтинга";
        console.error(e);
    }
}
function renderTable(data) {
    const tbody = document.querySelector("#ratingTable tbody");
    tbody.innerHTML = "";
    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${escapeHtml(row.name)}<\/td>
            <td>${row.points}<\/td>
            <td>${escapeHtml(row.projects)}<\/td>
        `;
        tbody.appendChild(tr);
    });
}
document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const filtered = ratingData.filter(r => r.name.toLowerCase().includes(val));
    renderTable(filtered);
});
document.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
        const col = th.dataset.col;
        ratingData.sort((a, b) => {
            let av = a[col], bv = b[col];
            if (col === "points") { av = Number(av); bv = Number(bv); }
            return av > bv ? 1 * sortDir : -1 * sortDir;
        });
        sortDir *= -1;
        renderTable(ratingData);
    });
});

// ---------- РУКОВОДСТВО ----------
const ROLE_ORDER = [
    "Председатель Совета СНО",
    "Заместитель председателя Совета СНО, координатор по организационной работе",
    "Заместитель председателя Совета СНО, координатор по работе с СНК",
    "Координатор по информационной работе",
    "Секретарь",
    "Советник председателя"
];
async function loadLeadership() {
    try {
        const res = await fetch(LEAD_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        let leaders = data.map(r => ({
            role: r[0],
            name: r[1],
            photo: r[2]
        }));
        leaders.sort((a,b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role));
        const container = document.getElementById("leadership");
        container.innerHTML = "";
        leaders.forEach(l => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                ${l.photo ? `<img src="images/${l.photo}" onerror="this.style.display='none'">` : ""}
                <div class="role">${escapeHtml(l.role)}</div>
                <div class="name">${escapeHtml(l.name)}</div>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        document.getElementById('leadError').innerText = "Ошибка загрузки состава";
        console.error(e);
    }
}

// ---------- КАЛЕНДАРЬ ----------
let currentYear, currentMonth;
let currentFilter = 'all';
let rawEventsAll = [];

async function loadEventsFromSources() {
    try {
        const resEvents = await fetch(EVENTS_URL);
        const textEvents = await resEvents.text();
        const rowsEvents = parseCSV(textEvents).slice(1);
        const events = rowsEvents.map(row => ({
            title: row[0]?.trim() || "Мероприятие",
            startRaw: row[1]?.trim(),
            endRaw: row[2]?.trim() || row[1]?.trim(),
            description: row[3]?.trim() || "",
            type: 'event'
        }));

        const resPosts = await fetch(POSTS_URL);
        const textPosts = await resPosts.text();
        const rowsPosts = parseCSV(textPosts).slice(1);
        const posts = rowsPosts.map(row => ({
            title: row[0]?.trim() || "Пост",
            startRaw: row[1]?.trim(),
            endRaw: row[2]?.trim() || row[1]?.trim(),
            description: row[3]?.trim() || "",
            type: 'post'
        }));

        const allRaw = [...events, ...posts];
        rawEventsAll = [];
        allRaw.forEach(item => {
            if (!item.startRaw) return;
            let startDate = parseDateFromString(item.startRaw);
            let endDate = parseDateFromString(item.endRaw);
            if (!startDate) return;
            if (!endDate) endDate = startDate;
            if (startDate > endDate) { let tmp = startDate; startDate = endDate; endDate = tmp; }
            rawEventsAll.push({
                title: item.title,
                start: startDate,
                end: endDate,
                description: item.description,
                type: item.type
            });
        });

        if (currentYear !== undefined) {
            renderCalendar(currentYear, currentMonth);
        }
    } catch(e) {
        console.error('Ошибка загрузки событий:', e);
        document.getElementById('calendar-main').innerHTML = '<p style="color:red;">Не удалось загрузить календарь</p>';
    }
}

function getFilteredEvents() {
    if (currentFilter === 'all') return rawEventsAll;
    return rawEventsAll.filter(ev => ev.type === currentFilter);
}

function renderCalendar(year, month) {
    const firstDayOfMonth = new Date(Date.UTC(year, month, 1));
    const startWeekday = firstDayOfMonth.getUTCDay();
    let startDate = new Date(firstDayOfMonth);
    let offset = (startWeekday === 0 ? 6 : startWeekday - 1);
    startDate.setUTCDate(startDate.getUTCDate() - offset);
    
    const days = [];
    for (let i = 0; i < 42; i++) {
        let date = new Date(startDate);
        date.setUTCDate(date.getUTCDate() + i);
        days.push(date);
    }
    
    const filteredEvents = getFilteredEvents();
    const eventsByDay = {};
    days.forEach(date => { eventsByDay[formatDateKey(date)] = []; });
    
    filteredEvents.forEach(ev => {
        const start = ev.start;
        const end = ev.end;
        days.forEach(date => {
            if (date >= start && date <= end) {
                const key = formatDateKey(date);
                const isFirst = (formatDateKey(date) === formatDateKey(start));
                eventsByDay[key].push({
                    ...ev,
                    isFirstDay: isFirst
                });
            }
        });
    });
    
    for (let key in eventsByDay) {
        const unique = [];
        const seen = new Set();
        eventsByDay[key].forEach(ev => {
            const id = ev.title + ev.start.toISOString();
            if (!seen.has(id)) {
                seen.add(id);
                unique.push(ev);
            }
        });
        eventsByDay[key] = unique;
    }
    
    const container = document.getElementById('calendar-main');
    container.innerHTML = '';
    
    const filterDiv = document.createElement('div');
    filterDiv.className = 'filter-buttons';
    filterDiv.innerHTML = `
        <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">Все</button>
        <button class="filter-btn ${currentFilter === 'event' ? 'active' : ''}" data-filter="event">Мероприятия</button>
        <button class="filter-btn ${currentFilter === 'post' ? 'active' : ''}" data-filter="post">Посты</button>
    `;
    container.appendChild(filterDiv);
    
    const wrapperDiv = document.createElement('div');
    wrapperDiv.className = 'calendar-container';
    
    const stickyHeader = document.createElement('div');
    stickyHeader.className = 'calendar-sticky-header';
    const headerDiv = document.createElement('div');
    headerDiv.className = 'calendar-header';
    headerDiv.innerHTML = `
        <div class="calendar-nav"><button id="prevMonthBtn">◀ Пред.</button></div>
        <div class="month-year">${formatFullMonthYear(year, month)}</div>
        <div class="calendar-nav"><button id="nextMonthBtn">След. ▶</button></div>
    `;
    stickyHeader.appendChild(headerDiv);
    wrapperDiv.appendChild(stickyHeader);
    
    const scrollDiv = document.createElement('div');
    scrollDiv.className = 'calendar-scroll';
    const gridDiv = document.createElement('div');
    gridDiv.className = 'calendar-grid';
    
    const weekdaysDiv = document.createElement('div');
    weekdaysDiv.className = 'weekdays';
    const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
    weekdays.forEach(day => {
        const d = document.createElement('div');
        d.className = 'weekday';
        d.textContent = day;
        weekdaysDiv.appendChild(d);
    });
    gridDiv.appendChild(weekdaysDiv);
    
    const daysGrid = document.createElement('div');
    daysGrid.className = 'calendar-days';
    
    days.forEach(date => {
        const key = formatDateKey(date);
        const dayNumber = date.getUTCDate();
        const isCurrentMonth = date.getUTCMonth() === month;
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.style.backgroundColor = isCurrentMonth ? 'white' : '#f9f9f9';
        
        const numDiv = document.createElement('div');
        numDiv.className = 'day-number';
        numDiv.textContent = dayNumber;
        cell.appendChild(numDiv);
        
        const dayEvents = eventsByDay[key] || [];
        dayEvents.sort((a,b) => a.title.localeCompare(b.title));
        
        dayEvents.forEach(ev => {
            const eventDiv = document.createElement('div');
            const typeClass = ev.type === 'event' ? 'event-bar--event' : 'event-bar--post';
            eventDiv.className = `event-bar ${typeClass}`;
            let displayText = ev.title;
            if (!ev.isFirstDay) {
                displayText = '→ ' + ev.title;
            }
            if (displayText.length > 28) displayText = displayText.slice(0,25) + '…';
            eventDiv.textContent = displayText;
            const startStr = formatDateKey(ev.start);
            const endStr = formatDateKey(ev.end);
            eventDiv.title = `${ev.title} (${ev.type === 'event' ? 'Мероприятие' : 'Пост'})${ev.description ? ': '+ev.description : ''} (${startStr} – ${endStr})`;
            eventDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('modalTitle').innerText = ev.title;
                document.getElementById('modalDesc').innerText = `${ev.description || 'Нет описания'}\nТип: ${ev.type === 'event' ? 'Мероприятие' : 'Пост'}`;
                document.getElementById('modalDates').innerText = `${startStr} — ${endStr}`;
                document.getElementById('eventModal').style.display = 'flex';
            });
            cell.appendChild(eventDiv);
        });
        
        daysGrid.appendChild(cell);
    });
    gridDiv.appendChild(daysGrid);
    scrollDiv.appendChild(gridDiv);
    wrapperDiv.appendChild(scrollDiv);
    container.appendChild(wrapperDiv);
    
    document.getElementById('prevMonthBtn').addEventListener('click', () => {
        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
        else { currentMonth--; }
        renderCalendar(currentYear, currentMonth);
    });
    document.getElementById('nextMonthBtn').addEventListener('click', () => {
        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
        else { currentMonth++; }
        renderCalendar(currentYear, currentMonth);
    });
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.dataset.filter;
            renderCalendar(currentYear, currentMonth);
        });
    });
}

function initCalendar() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar(currentYear, currentMonth);
}

const modal = document.getElementById('eventModal');
const closeBtn = document.getElementById('closeModalBtn');
closeBtn.onclick = () => { modal.style.display = 'none'; };
window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

loadRating();
loadLeadership();
loadEventsFromSources().then(() => initCalendar());
</script>
