<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Совет СНО ПИМУ</title>

<!-- PWA manifest и мета-теги -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="images/icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ===== СТИЛИ (проверенные, работающие) ===== */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #333;
}
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: white;
    border-bottom: 2px solid #eee;
}
.header-left {
    display: flex;
    align-items: center;
}
.logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
    margin-right: 15px;
}
.header-text {
    display: flex;
    flex-direction: column;
}
.title {
    font-size: 22px;
    font-weight: 600;
}
.slogan {
    font-size: 14px;
    font-weight: 300;
    color: #555;
    margin-top: 5px;
}
.install-btn {
    background: #ff7a00;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: none;
}
.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.card img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 10px;
}
.role {
    font-size: 14px;
    color: #777;
}
.name {
    font-weight: 600;
    margin-top: 5px;
}
.total-card {
    background: #fff4e6;
    border-left: 5px solid #ff7a00;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 500;
}
.total-card span {
    font-weight: 700;
    color: #ff7a00;
    font-size: 22px;
}
.search-box {
    margin-bottom: 15px;
}
.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}
th, td {
    padding: 12px;
    text-align: left;
}
th {
    background: #f0f0f0;
    cursor: pointer;
}
tr:nth-child(even) {
    background: #fafafa;
}
th:hover {
    background: #e6e6e6;
}
.accent {
    color: #ff7a00;
}
.error {
    color: red;
    margin-top: 10px;
}
@media (max-width: 600px) {
    .title { font-size: 18px; }
    .slogan { font-size: 12px; }
    .total-card { font-size: 15px; }
}
</style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="images/logo.png" class="logo" alt="Логотип" onerror="this.style.display='none'">
        <div class="header-text">
            <div class="title">Совет <span class="accent">СНО ПИМУ</span></div>
            <div class="slogan">Развиваем тех, кто меняет медицину</div>
        </div>
    </div>
    <button id="installBtn" class="install-btn">Установить</button>
</header>

<div class="container">
    <h2>Руководящий состав</h2>
    <div class="cards" id="leadership"></div>
    <div id="leadError" class="error"></div>

    <h2 style="margin-top:40px;">Рейтинг</h2>
    <div class="total-card">
        Общая сумма НОМУС-коинов: <span id="totalPointsValue">0</span>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Поиск по ФИО...">
    </div>
    <table id="ratingTable">
        <thead>
            <tr>
                <th data-col="name">ФИО</th>
                <th data-col="points">Сумма НОМУС-коинов</th>
                <th data-col="projects">Продуктовые запросы</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="ratingError" class="error"></div>
</div>

<script>
// ===================== ВАШИ РАБОЧИЕ ССЫЛКИ =====================
const RATING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=0&single=true&output=csv";
const LEAD_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1094569537&single=true&output=csv";
// =================================================================

// Порядок должностей
const ROLE_ORDER = [
    "Председатель Совета СНО",
    "Заместитель председателя Совета СНО, координатор по организационной работе",
    "Заместитель председателя Совета СНО, координатор по работе с СНК",
    "Координатор по информационной работе",
    "Секретарь",
    "Советник председателя"
];

// ПРАВИЛЬНЫЙ ПАРСЕР CSV (поддержка кавычек)
function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = '';
    let insideQuotes = false;

    for (let char of text) {
        if (char === '"') {
            insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
            row.push(current);
            current = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (current || row.length) {
                row.push(current);
                rows.push(row);
                row = [];
                current = '';
            }
        } else {
            current += char;
        }
    }
    if (current) row.push(current);
    if (row.length) rows.push(row);
    return rows;
}

// РЕЙТИНГ
let ratingData = [];
let sortDir = 1;

async function loadRating() {
    try {
        const res = await fetch(RATING_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1); // отрезаем заголовок
        ratingData = data.map(r => ({
            name: r[0] || "",
            points: parseInt(r[1]) || 0,
            projects: r[2] || ""
        }));
        const total = ratingData.reduce((sum, p) => sum + p.points, 0);
        document.getElementById('totalPointsValue').innerText = total;
        renderTable(ratingData);
    } catch(e) {
        document.getElementById('ratingError').innerText = "Ошибка загрузки рейтинга";
        console.error(e);
    }
}

function renderTable(data) {
    const tbody = document.querySelector("#ratingTable tbody");
    tbody.innerHTML = "";
    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${escapeHtml(row.name)}</td>
            <td>${row.points}</td>
            <td>${escapeHtml(row.projects)}</td>
        `;
        tbody.appendChild(tr);
    });
}

// Поиск
document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const filtered = ratingData.filter(r => r.name.toLowerCase().includes(val));
    renderTable(filtered);
});

// Сортировка
document.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
        const col = th.dataset.col;
        ratingData.sort((a, b) => {
            let av = a[col], bv = b[col];
            if (col === "points") { av = Number(av); bv = Number(bv); }
            return av > bv ? 1 * sortDir : -1 * sortDir;
        });
        sortDir *= -1;
        renderTable(ratingData);
    });
});

// РУКОВОДСТВО
async function loadLeadership() {
    try {
        const res = await fetch(LEAD_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        let leaders = data.map(r => ({
            role: r[0],
            name: r[1],
            photo: r[2]
        }));
        leaders.sort((a,b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role));
        const container = document.getElementById("leadership");
        container.innerHTML = "";
        leaders.forEach(l => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                ${l.photo ? `<img src="images/${l.photo}" onerror="this.style.display='none'">` : ""}
                <div class="role">${escapeHtml(l.role)}</div>
                <div class="name">${escapeHtml(l.name)}</div>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        document.getElementById('leadError').innerText = "Ошибка загрузки состава";
        console.error(e);
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// КНОПКА УСТАНОВКИ (PWA)
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'block';
});
document.getElementById('installBtn').onclick = async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installBtn').style.display = 'none';
    }
};

// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered', reg);
    }).catch(err => console.log('SW error', err));
}

// ЗАГРУЗКА ДАННЫХ
loadRating();
loadLeadership();
</script>
</body>
</html>
