<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Совет СНО ПИМУ</title>
<link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #333;
}
header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: white;
    border-bottom: 2px solid #eee;
    gap: 15px;
    flex-wrap: wrap;
}
.logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
}
.header-text {
    display: flex;
    flex-direction: column;
}
.title {
    font-size: 22px;
    font-weight: 600;
}
.slogan {
    font-size: 14px;
    font-weight: 300;
    color: #555;
    margin-top: 5px;
}
.accent {
    color: #ff7a00;
}
.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.card img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 10px;
}
.role {
    font-size: 14px;
    color: #777;
}
.name {
    font-weight: 600;
    margin-top: 5px;
}
.total-card {
    background: #fff4e6;
    border-left: 5px solid #ff7a00;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 500;
}
.total-card span {
    font-weight: 700;
    color: #ff7a00;
    font-size: 22px;
}
.search-box {
    margin-bottom: 15px;
}
.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: inherit;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow-x: auto;
    display: block;
}
th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
}
th {
    background: #f0f0f0;
    cursor: pointer;
}
tr:nth-child(even) {
    background: #fafafa;
}
th:hover {
    background: #e6e6e6;
}
.error {
    color: red;
    margin-top: 10px;
}
/* Календарь */
.calendar-wrapper {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    margin-bottom: 30px;
    overflow-x: auto;
}
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}
.calendar-nav button {
    background: #ff7a00;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin: 0 4px;
}
.calendar-nav button:hover {
    background: #e06a00;
}
.month-year {
    font-size: 1.5rem;
    font-weight: 600;
}
.calendar-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}
.calendar-table th, .calendar-table td {
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
    padding: 6px;
    width: 14%;
    background-color: white;
}
.calendar-table td {
    height: auto;
    min-height: 90px;
    cursor: pointer;
}
.calendar-table td:hover {
    background-color: #fff4e6;
}
.day-number {
    font-weight: bold;
    text-align: right;
    margin-bottom: 4px;
}
.event-item {
    background-color: #ffefdb;
    border-left: 3px solid #ff7a00;
    margin-top: 2px;
    padding: 2px 4px;
    font-size: 12px;
    border-radius: 4px;
    white-space: nowrap;
    overflow-x: hidden;
    text-overflow: ellipsis;
}
.event-item strong {
    font-weight: 600;
    color: #e06a00;
}
.more-events {
    font-size: 11px;
    color: #777;
    text-align: center;
    margin-top: 2px;
}
@media (max-width: 768px) {
    .container {
        padding: 12px;
    }
    .title {
        font-size: 18px;
    }
    .cards {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    .card img {
        width: 90px;
        height: 90px;
    }
    th, td {
        padding: 8px;
        font-size: 14px;
    }
    .calendar-table td {
        min-height: 65px;
    }
    .event-item {
        font-size: 10px;
        padding: 1px 2px;
    }
}
</style>
</head>
<body>

<header>
    <img src="images/logo.png" class="logo" alt="Логотип" onerror="this.style.display='none'">
    <div class="header-text">
        <div class="title">Совет <span class="accent">СНО ПИМУ</span></div>
        <div class="slogan">Развиваем тех, кто меняет медицину</div>
    </div>
</header>

<div class="container">
    <h2>Руководящий состав</h2>
    <div class="cards" id="leadership"></div>
    <div id="leadError" class="error"></div>

    <h2>Календарь событий</h2>
    <div class="calendar-wrapper" id="calendar-wrapper"></div>

    <h2>Рейтинг</h2>
    <div class="total-card">
        Общая сумма НОМУС-коинов: <span id="totalPointsValue">0</span>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Поиск по ФИО...">
    </div>
    <table id="ratingTable">
        <thead>
            <tr>
                <th data-col="name">ФИО</th>
                <th data-col="points">Сумма НОМУС-коинов</th>
                <th data-col="projects">Продуктовые запросы</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="ratingError" class="error"></div>
</div>

<script>
// ======================== GOOGLE SHEETS ССЫЛКИ ========================
const RATING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=0&single=true&output=csv";
const LEAD_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1094569537&single=true&output=csv";
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1988770029&single=true&output=csv";
// ======================================================================

// Парсер CSV
function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = '';
    let insideQuotes = false;
    for (let char of text) {
        if (char === '"') insideQuotes = !insideQuotes;
        else if (char === ',' && !insideQuotes) {
            row.push(current);
            current = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (current || row.length) {
                row.push(current);
                rows.push(row);
                row = [];
                current = '';
            }
        } else {
            current += char;
        }
    }
    if (current) row.push(current);
    if (row.length) rows.push(row);
    return rows;
}

// ---------- РЕЙТИНГ ----------
let ratingData = [];
let sortDir = 1;

async function loadRating() {
    try {
        const res = await fetch(RATING_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        ratingData = data.map(r => ({
            name: r[0] || "",
            points: parseInt(r[1]) || 0,
            projects: r[2] || ""
        }));
        const total = ratingData.reduce((sum, p) => sum + p.points, 0);
        document.getElementById('totalPointsValue').innerText = total;
        renderTable(ratingData);
    } catch(e) {
        document.getElementById('ratingError').innerText = "Ошибка загрузки рейтинга";
        console.error(e);
    }
}

function renderTable(data) {
    const tbody = document.querySelector("#ratingTable tbody");
    tbody.innerHTML = "";
    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${escapeHtml(row.name)}<\/td>
            <td>${row.points}<\/td>
            <td>${escapeHtml(row.projects)}<\/td>
        `;
        tbody.appendChild(tr);
    });
}

document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const filtered = ratingData.filter(r => r.name.toLowerCase().includes(val));
    renderTable(filtered);
});

document.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
        const col = th.dataset.col;
        ratingData.sort((a, b) => {
            let av = a[col], bv = b[col];
            if (col === "points") { av = Number(av); bv = Number(bv); }
            return av > bv ? 1 * sortDir : -1 * sortDir;
        });
        sortDir *= -1;
        renderTable(ratingData);
    });
});

// ---------- РУКОВОДСТВО ----------
const ROLE_ORDER = [
    "Председатель Совета СНО",
    "Заместитель председателя Совета СНО, координатор по организационной работе",
    "Заместитель председателя Совета СНО, координатор по работе с СНК",
    "Координатор по информационной работе",
    "Секретарь",
    "Советник председателя"
];

async function loadLeadership() {
    try {
        const res = await fetch(LEAD_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        let leaders = data.map(r => ({
            role: r[0],
            name: r[1],
            photo: r[2]
        }));
        leaders.sort((a,b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role));
        const container = document.getElementById("leadership");
        container.innerHTML = "";
        leaders.forEach(l => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                ${l.photo ? `<img src="images/${l.photo}" onerror="this.style.display='none'">` : ""}
                <div class="role">${escapeHtml(l.role)}</div>
                <div class="name">${escapeHtml(l.name)}</div>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        document.getElementById('leadError').innerText = "Ошибка загрузки состава";
        console.error(e);
    }
}

// ---------- КАЛЕНДАРЬ с текстовым отображением событий ----------
let currentYear, currentMonth;
let eventsByDate = {}; // { "YYYY-MM-DD": [ {title, description} ] }

async function loadEvents() {
    try {
        const res = await fetch(EVENTS_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const rows = parseCSV(text).slice(1);
        eventsByDate = {};
        rows.forEach(row => {
            let title = row[0]?.trim() || "Событие";
            let startRaw = row[1]?.trim();
            let description = row[3]?.trim() || "";
            if (!startRaw) return;
            let dateStr = null;
            // Поддержка YYYY-MM-DD и DD.MM.YYYY
            let match = startRaw.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (match) {
                dateStr = `${match[1]}-${match[2]}-${match[3]}`;
            } else {
                match = startRaw.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
                if (match) {
                    dateStr = `${match[3]}-${match[2]}-${match[1]}`;
                }
            }
            if (!dateStr) return;
            if (!eventsByDate[dateStr]) eventsByDate[dateStr] = [];
            eventsByDate[dateStr].push({ title, description });
        });
        if (currentYear !== undefined) {
            renderCalendar(currentYear, currentMonth);
        }
    } catch(e) {
        console.error('Ошибка загрузки событий:', e);
        document.getElementById('calendar-wrapper').innerHTML = '<p style="color:red;">Не удалось загрузить календарь</p>';
    }
}

function renderCalendar(year, month) {
    const firstDayOfMonth = new Date(year, month, 1);
    const startWeekday = firstDayOfMonth.getDay(); // 0 воскресенье
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
    let startOffset = startWeekday === 0 ? 6 : startWeekday - 1;
    
    let calendarHtml = `<div class="calendar-header">
        <div class="month-year">${month+1}.${year}</div>
        <div class="calendar-nav">
            <button id="prevMonthBtn">◀ Пред.</button>
            <button id="nextMonthBtn">След. ▶</button>
        </div>
    </div>
    <table class="calendar-table">
        <thead><tr>${weekdays.map(day => `<th>${day}</th>`).join('')}</tr></thead>
        <tbody><tr>`;
    
    let dayCount = 1;
    for (let i = 0; i < 42; i++) {
        if (i >= startOffset && dayCount <= daysInMonth) {
            const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(dayCount).padStart(2,'0')}`;
            const events = eventsByDate[dateKey] || [];
            // Строим HTML событий
            let eventsHtml = '';
            const maxDisplay = 3; // показываем максимум 3 события в ячейке
            for (let idx = 0; idx < Math.min(events.length, maxDisplay); idx++) {
                const ev = events[idx];
                let shortTitle = ev.title.length > 20 ? ev.title.slice(0,18)+'…' : ev.title;
                eventsHtml += `<div class="event-item" title="${escapeHtml(ev.title)}${ev.description ? ': ' + escapeHtml(ev.description) : ''}">
                    <strong>•</strong> ${escapeHtml(shortTitle)}
                </div>`;
            }
            if (events.length > maxDisplay) {
                eventsHtml += `<div class="more-events">+ ещё ${events.length - maxDisplay}</div>`;
            }
            calendarHtml += `<td data-date="${dateKey}">
                <div class="day-number">${dayCount}</div>
                ${eventsHtml}
            </td>`;
            dayCount++;
        } else {
            calendarHtml += `<td style="background:#f9f9f9;"></td>`;
        }
        if ((i+1) % 7 === 0 && i !== 41) {
            calendarHtml += `</tr><tr>`;
        }
    }
    calendarHtml += `</tr></tbody></table>`;
    
    document.getElementById('calendar-wrapper').innerHTML = calendarHtml;
    
    // Обработчики кликов на ячейках (для детального просмотра)
    document.querySelectorAll('.calendar-table td[data-date]').forEach(cell => {
        cell.addEventListener('click', () => {
            const date = cell.getAttribute('data-date');
            const events = eventsByDate[date] || [];
            if (events.length === 0) {
                alert('Нет событий на эту дату');
            } else {
                let msg = events.map(e => `${e.title}${e.description ? ': ' + e.description : ''}`).join('\n');
                alert(`События на ${date}:\n${msg}`);
            }
        });
    });
    
    // Обработчики кнопок навигации
    const prevBtn = document.getElementById('prevMonthBtn');
    const nextBtn = document.getElementById('nextMonthBtn');
    if (prevBtn) {
        prevBtn.addEventListener('click', () => {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            renderCalendar(currentYear, currentMonth);
        });
    }
    if (nextBtn) {
        nextBtn.addEventListener('click', () => {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            renderCalendar(currentYear, currentMonth);
        });
    }
}

function initCalendar() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar(currentYear, currentMonth);
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Запуск
loadRating();
loadLeadership();
loadEvents().then(() => initCalendar());
</script>
</body>
</html>
