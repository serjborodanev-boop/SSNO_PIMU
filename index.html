<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Совет СНО ПИМУ</title>
<link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<!-- CSS и JS Vanilla Calendar Pro -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro@2.9.0/build/vanilla-calendar.min.css">
<script src="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro@2.9.0/build/vanilla-calendar.min.js"></script>
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #333;
}
header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: white;
    border-bottom: 2px solid #eee;
    gap: 15px;
    flex-wrap: wrap;
}
.logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
}
.header-text {
    display: flex;
    flex-direction: column;
}
.title {
    font-size: 22px;
    font-weight: 600;
}
.slogan {
    font-size: 14px;
    font-weight: 300;
    color: #555;
    margin-top: 5px;
}
.accent {
    color: #ff7a00;
}
.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.card img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 10px;
}
.role {
    font-size: 14px;
    color: #777;
}
.name {
    font-weight: 600;
    margin-top: 5px;
}
.total-card {
    background: #fff4e6;
    border-left: 5px solid #ff7a00;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 500;
}
.total-card span {
    font-weight: 700;
    color: #ff7a00;
    font-size: 22px;
}
.search-box {
    margin-bottom: 15px;
}
.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: inherit;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow-x: auto;
    display: block;
}
th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
}
th {
    background: #f0f0f0;
    cursor: pointer;
}
tr:nth-child(even) {
    background: #fafafa;
}
th:hover {
    background: #e6e6e6;
}
.error {
    color: red;
    margin-top: 10px;
}
#calendar-container {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    margin-bottom: 30px;
}
/* Дополнительная адаптация для календаря */
.vanilla-calendar {
    max-width: 100%;
    overflow-x: auto;
}
@media (max-width: 768px) {
    .container {
        padding: 12px;
    }
    .title {
        font-size: 18px;
    }
    .cards {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    .card img {
        width: 90px;
        height: 90px;
    }
    th, td {
        padding: 8px;
        font-size: 14px;
    }
    .vanilla-calendar-day__popup {
        max-width: 90vw;
    }
}
</style>
</head>
<body>

<header>
    <img src="images/logo.png" class="logo" alt="Логотип" onerror="this.style.display='none'">
    <div class="header-text">
        <div class="title">Совет <span class="accent">СНО ПИМУ</span></div>
        <div class="slogan">Развиваем тех, кто меняет медицину</div>
    </div>
</header>

<div class="container">
    <h2>Руководящий состав</h2>
    <div class="cards" id="leadership"></div>
    <div id="leadError" class="error"></div>

    <h2>Календарь событий</h2>
    <div id="calendar-container"></div>

    <h2>Рейтинг</h2>
    <div class="total-card">
        Общая сумма НОМУС-коинов: <span id="totalPointsValue">0</span>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Поиск по ФИО...">
    </div>
    <table id="ratingTable">
        <thead>
            <tr>
                <th data-col="name">ФИО</th>
                <th data-col="points">Сумма НОМУС-коинов</th>
                <th data-col="projects">Продуктовые запросы</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="ratingError" class="error"></div>
</div>

<script>
// ======================== GOOGLE SHEETS ССЫЛКИ ========================
const RATING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=0&single=true&output=csv";
const LEAD_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1094569537&single=true&output=csv";
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2ui9ijGUHk_PqZCuFzg1cCfvdXM1_8joz0eNrrwmma7VKteZkiX2bMjPv1Ci0UJxvRYqnx1x8Vbgo/pub?gid=1988770029&single=true&output=csv";
// ======================================================================

// Парсер CSV (универсальный)
function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = '';
    let insideQuotes = false;
    for (let char of text) {
        if (char === '"') insideQuotes = !insideQuotes;
        else if (char === ',' && !insideQuotes) {
            row.push(current);
            current = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (current || row.length) {
                row.push(current);
                rows.push(row);
                row = [];
                current = '';
            }
        } else {
            current += char;
        }
    }
    if (current) row.push(current);
    if (row.length) rows.push(row);
    return rows;
}

// ---------- РЕЙТИНГ ----------
let ratingData = [];
let sortDir = 1;

async function loadRating() {
    try {
        const res = await fetch(RATING_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        ratingData = data.map(r => ({
            name: r[0] || "",
            points: parseInt(r[1]) || 0,
            projects: r[2] || ""
        }));
        const total = ratingData.reduce((sum, p) => sum + p.points, 0);
        document.getElementById('totalPointsValue').innerText = total;
        renderTable(ratingData);
    } catch(e) {
        document.getElementById('ratingError').innerText = "Ошибка загрузки рейтинга";
        console.error(e);
    }
}

function renderTable(data) {
    const tbody = document.querySelector("#ratingTable tbody");
    tbody.innerHTML = "";
    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${escapeHtml(row.name)}<\/td>
            <td>${row.points}<\/td>
            <td>${escapeHtml(row.projects)}<\/td>
        `;
        tbody.appendChild(tr);
    });
}

document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const filtered = ratingData.filter(r => r.name.toLowerCase().includes(val));
    renderTable(filtered);
});

document.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
        const col = th.dataset.col;
        ratingData.sort((a, b) => {
            let av = a[col], bv = b[col];
            if (col === "points") { av = Number(av); bv = Number(bv); }
            return av > bv ? 1 * sortDir : -1 * sortDir;
        });
        sortDir *= -1;
        renderTable(ratingData);
    });
});

// ---------- РУКОВОДСТВО ----------
const ROLE_ORDER = [
    "Председатель Совета СНО",
    "Заместитель председателя Совета СНО, координатор по организационной работе",
    "Заместитель председателя Совета СНО, координатор по работе с СНК",
    "Координатор по информационной работе",
    "Секретарь",
    "Советник председателя"
];

async function loadLeadership() {
    try {
        const res = await fetch(LEAD_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        let leaders = data.map(r => ({
            role: r[0],
            name: r[1],
            photo: r[2]
        }));
        leaders.sort((a,b) => ROLE_ORDER.indexOf(a.role) - ROLE_ORDER.indexOf(b.role));
        const container = document.getElementById("leadership");
        container.innerHTML = "";
        leaders.forEach(l => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                ${l.photo ? `<img src="images/${l.photo}" onerror="this.style.display='none'">` : ""}
                <div class="role">${escapeHtml(l.role)}</div>
                <div class="name">${escapeHtml(l.name)}</div>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        document.getElementById('leadError').innerText = "Ошибка загрузки состава";
        console.error(e);
    }
}

// ---------- КАЛЕНДАРЬ Vanilla Calendar Pro ----------
let calendarInstance = null;

async function loadEventsForCalendar() {
    try {
        const res = await fetch(EVENTS_URL);
        if (!res.ok) throw new Error();
        const text = await res.text();
        const rows = parseCSV(text).slice(1);
        // формируем объект: ключ - дата YYYY-MM-DD, значение - массив событий
        const eventsMap = {};
        rows.forEach(row => {
            const title = row[0] || "Событие";
            const startDate = row[1] ? row[1].split(' ')[0] : null; // берём только дату
            const description = row[3] || "";
            if (startDate) {
                if (!eventsMap[startDate]) eventsMap[startDate] = [];
                eventsMap[startDate].push({
                    title: title,
                    description: description
                });
            }
        });
        
        // преобразуем в формат, ожидаемый Vanilla Calendar Pro (массив объектов с date и title)
        const markedDates = Object.keys(eventsMap).map(date => {
            const events = eventsMap[date];
            // объединяем названия в одну строку для всплывающей подсказки
            const popoverText = events.map(e => e.title + (e.description ? `: ${e.description}` : '')).join('\n');
            return {
                date: date,
                title: events.map(e => e.title).join(', '),
                popover: { title: 'События', content: popoverText }
            };
        });
        
        if (calendarInstance) {
            calendarInstance.destroy();
            calendarInstance = null;
        }
        
        const calendarContainer = document.getElementById('calendar-container');
        calendarContainer.innerHTML = ''; // очищаем
        calendarInstance = new VanillaCalendar(calendarContainer, {
            settings: {
                lang: 'ru',
                firstWeekDay: 1,
                visibility: {
                    theme: 'light',
                    weekend: true,
                    today: true
                },
                selection: {
                    day: false,
                    month: false,
                    year: false
                }
            },
            popups: {
                priority: 'shown',
                modifiers: { title: 'tooltip-center' }
            }
        });
        
        // Добавляем отмеченные даты
        if (markedDates.length) {
            calendarInstance.settings.markedDates = markedDates;
        }
        
        calendarInstance.init();
        
        // После инициализации добавляем кастомные данные для popup, если нужно
        calendarInstance.update();
        
    } catch(e) {
        console.error('Ошибка загрузки событий для календаря:', e);
        document.getElementById('calendar-container').innerHTML = '<p style="color:red;">Не удалось загрузить календарь. Проверьте ссылку на CSV и формат дат (YYYY-MM-DD).</p>';
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Запуск
loadRating();
loadLeadership();
loadEventsForCalendar();
</script>
</body>
</html>
